 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>知识仓库</title>
 <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2'><path d='M4 19.5v-15A2.5 2.5 0 016.5 2H19a1 1 0 011 1v18a1 1 0 01-1 1H6.5A2.5 2.5 0 014 19.5z'/><path d='M9 6h6'/><path d='M9 10h6'/><path d='M9 14h4'/></svg>">
 <style>
 :root {
   --bg: #f8f9fa;
   --surface: #ffffff;
   --border: #e2e5ea;
   --text: #1a1d23;
   --text-secondary: #6b7280;
   --primary: #3b82f6;
   --primary-hover: #2563eb;
   --primary-light: #eff6ff;
   --radius: 8px;
   --shadow: 0 1px 3px rgba(0,0,0,.08);
   --sidebar-w: 240px;
 }
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
   font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
   background: var(--bg);
   color: var(--text);
   display: flex;
   min-height: 100vh;
 }
 .sidebar {
   width: var(--sidebar-w);
   background: var(--surface);
   border-right: 1px solid var(--border);
   padding: 20px 0;
   display: flex;
   flex-direction: column;
   position: fixed;
   top: 0; left: 0;
   height: 100vh;
   z-index: 10;
 }
 .sidebar-header {
   padding: 0 16px 16px;
   border-bottom: 1px solid var(--border);
   margin-bottom: 12px;
 }
 .sidebar-header h1 {
   font-size: 18px;
   font-weight: 700;
   display: flex;
   align-items: center;
   gap: 8px;
   color: var(--text);
 }
 .sidebar-header h1 svg { width: 22px; height: 22px; stroke: var(--primary); }
 .sidebar-header .sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
 .sidebar nav { flex: 1; overflow-y: auto; padding: 0 8px; }
 .nav-item {
   display: flex;
   align-items: center;
   gap: 10px;
   padding: 8px 12px;
   border-radius: 6px;
   cursor: pointer;
   font-size: 14px;
   color: var(--text-secondary);
   transition: all .12s;
   user-select: none;
 }
 .nav-item:hover { background: var(--bg); color: var(--text); }
 .nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
 .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
 .nav-item .count {
   margin-left: auto;
   font-size: 12px;
   color: var(--text-secondary);
   background: var(--bg);
   padding: 1px 7px;
   border-radius: 10px;
   min-width: 20px;
   text-align: center;
 }
 .nav-item.active .count { background: var(--primary); color: #fff; }
 .nav-section { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-secondary); padding: 16px 12px 6px; }
 .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); }
 .main { margin-left: var(--sidebar-w); flex: 1; padding: 28px 36px; max-width: calc(100vw - var(--sidebar-w)); }
 .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
 .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 420px; }
 .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-secondary); pointer-events: none; }
 .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; background: var(--surface); color: var(--text); outline: none; transition: border .15s; }
 .search-wrap input:focus { border-color: var(--primary); }
 .search-wrap input::placeholder { color: var(--text-secondary); }
 .top-bar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
 .top-bar-right .count-label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
 .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all .12s; white-space: nowrap; }
 .btn svg { width: 16px; height: 16px; }
 .btn-primary { background: var(--primary); color: #fff; }
 .btn-primary:hover { background: var(--primary-hover); }
 .btn-outline { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
 .btn-outline:hover { background: var(--bg); }
 .btn-ghost { background: transparent; color: var(--text-secondary); padding: 6px 8px; }
 .btn-ghost:hover { background: var(--bg); color: var(--text); }
 .btn-danger { color: #ef4444; }
 .btn-danger:hover { background: #fef2f2; }
 .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
 .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; transition: box-shadow .15s; cursor: default; }
 .card:hover { box-shadow: var(--shadow); }
 .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
 .card-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; word-break: break-word; }
 .card-title a { color: var(--primary); text-decoration: none; }
 .card-title a:hover { text-decoration: underline; }
 .card-actions { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity .12s; }
 .card:hover .card-actions { opacity: 1; }
 .card-actions button { background: none; border: none; cursor: pointer; padding: 4px; border-radius: 4px; color: var(--text-secondary); display: flex; }
 .card-actions button:hover { background: var(--bg); color: var(--text); }
 .card-actions button svg { width: 14px; height: 14px; }
 .card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word; }
 .card-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 8px; }
 .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
 .badge-category { background: var(--primary-light); color: var(--primary); }
 .badge-tag { background: #fffbeb; color: #92400e; }
 .card-url { font-size: 12px; color: var(--text-secondary); word-break: break-all; }
 .card-url a { color: inherit; text-decoration: none; }
 .card-url a:hover { color: var(--primary); }
 .card-date { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
 .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-secondary); }
 .empty-state svg { width: 48px; height: 48px; stroke: var(--border); margin-bottom: 12px; }
 .empty-state p { font-size: 14px; line-height: 1.6; }
 .empty-state .action { color: var(--primary); cursor: pointer; font-weight: 500; }
 .empty-state .action:hover { text-decoration: underline; }
 .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .15s; }
 .modal-overlay.open { opacity: 1; pointer-events: auto; }
 .modal { background: var(--surface); border-radius: 12px; width: 520px; max-width: 90vw; max-height: 85vh; overflow-y: auto; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,.15); }
 .modal h2 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
 .form-group { margin-bottom: 16px; }
 .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text); }
 .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; background: var(--surface); color: var(--text); outline: none; transition: border .15s; font-family: inherit; }
 .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); }
 .form-group textarea { min-height: 80px; resize: vertical; }
 .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
 .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
 .tag-input-wrap { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; min-height: 38px; cursor: text; transition: border .15s; }
 .tag-input-wrap:focus-within { border-color: var(--primary); }
 .tag-input-wrap .tag { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px 2px 8px; background: #fffbeb; border-radius: 4px; font-size: 12px; color: #92400e; }
 .tag-input-wrap .tag button { background: none; border: none; cursor: pointer; padding: 0; display: flex; color: #92400e; font-size: 14px; line-height: 1; opacity: .6; }
 .tag-input-wrap .tag button:hover { opacity: 1; }
 .tag-input-wrap input { flex: 1; min-width: 80px; border: none !important; outline: none; padding: 2px 0; font-size: 13px; background: transparent; }
 .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #fff; padding: 10px 20px; border-radius: var(--radius); font-size: 13px; box-shadow: 0 4px 12px rgba(0,0,0,.2); opacity: 0; transition: all .25s; pointer-events: none; z-index: 200; }
 .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 ::-webkit-scrollbar { width: 6px; }
 ::-webkit-scrollbar-track { background: transparent; }
 ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
 ::-webkit-scrollbar-thumb:hover { background: #c4c9d0; }
 @media (max-width: 720px) {
   .sidebar { width: 100%; height: auto; position: relative; }
   .main { margin-left: 0; padding: 16px; max-width: 100%; }
   .grid { grid-template-columns: 1fr; }
   .form-row { grid-template-columns: 1fr; }
   .top-bar { flex-direction: column; align-items: stretch; }
   .search-wrap { max-width: none; }
   .top-bar-right { margin-left: 0; }
 }
 </style>
 </head>
 <body>
 <aside class="sidebar">
   <div class="sidebar-header">
     <h1><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 016.5 2H19a1 1 0 011 1v18a1 1 0 01-1 1H6.5A2.5 2.5 0 014 19.5z"/><path d="M9 6h6"/><path d="M9 10h6"/><path d="M9 14h4"/></svg> 知识仓库</h1>
     <div class="sub">学习资料管理</div>
   </div>
   <nav id="categoryNav">
     <div class="nav-item active" data-cat="all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> 全部 <span class="count" id="countAll">0</span></div>
     <div class="nav-item" data-cat="uncategorized"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg> 未分类 <span class="count" id="countUncategorized">0</span></div>
     <div class="nav-section">分类</div>
     <div id="categoryList"></div>
     <div class="nav-item" id="addCategoryBtn" style="margin-top:4px;color:var(--primary);font-size:13px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 添加分类</div>
   </nav>
   <div class="sidebar-footer">数据存储在本地浏览器中</div>
 </aside>
 <main class="main">
   <div class="top-bar">
     <div class="search-wrap">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
       <input type="text" id="searchInput" placeholder="搜索标题、描述、标签..." autocomplete="off">
     </div>
     <div class="top-bar-right">
       <span class="count-label" id="resultCount">共 0 项</span>
       <button class="btn btn-primary" id="addBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 添加资料</button>
     </div>
   </div>
   <div class="grid" id="cardGrid"></div>
 </main>
 <div class="modal-overlay" id="modalOverlay">
   <div class="modal">
     <h2 id="modalTitle">添加资料</h2>
     <form id="entryForm" autocomplete="off">
       <div class="form-group">
         <label for="formTitle">标题 *</label>
         <input type="text" id="formTitle" placeholder="输入资料标题" required>
       </div>
       <div class="form-group">
         <label for="formUrl">链接</label>
         <input type="url" id="formUrl" placeholder="https://...">
       </div>
       <div class="form-group">
         <label for="formDesc">描述</label>
         <textarea id="formDesc" placeholder="简要描述这篇资料的内容..."></textarea>
       </div>
       <div class="form-row">
         <div class="form-group">
           <label for="formCategory">分类</label>
           <select id="formCategory"><option value="">未分类</option></select>
         </div>
         <div class="form-group">
           <label>标签</label>
           <div class="tag-input-wrap" id="tagInputWrap">
             <div id="tagList"></div>
             <input type="text" id="tagInput" placeholder="输入标签，回车添加" autocomplete="off">
           </div>
         </div>
       </div>
       <div class="form-actions">
         <button type="button" class="btn btn-outline" id="modalCancel">取消</button>
         <button type="submit" class="btn btn-primary" id="modalSave">保存</button>
       </div>
     </form>
   </div>
 </div>
 <div class="toast" id="toast"></div>
 <script>
 const STORAGE_KEY = 'knowledge_repo_data';
 let data = loadData();
 let currentCategory = 'all';
 let editingId = null;
 let pendingTags = [];
 function defaultData() { return { entries: [], categories: [] }; }
 function loadData() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {} return defaultData(); }
 function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
 function uid() { return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7); }
 function fmtDate(ts) { const d = new Date(ts); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
 function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
 
 function render() {
   const q = document.getElementById('searchInput').value.trim().toLowerCase();
   let filtered = data.entries;
   if (currentCategory === 'uncategorized') filtered = filtered.filter(e => !e.category);
   else if (currentCategory !== 'all') filtered = filtered.filter(e => e.category === currentCategory);
   if (q) filtered = filtered.filter(e => (e.title||'').toLowerCase().includes(q) || (e.desc||'').toLowerCase().includes(q) || (e.tags||[]).some(t => t.includes(q)) || (e.url||'').includes(q));
   filtered.sort((a, b) => (b.createdAt||0) - (a.createdAt||0));
   const grid = document.getElementById('cardGrid');
   document.getElementById('resultCount').textContent = '共 ' + filtered.length + ' 项';
   if (filtered.length === 0) {
     grid.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg><p>' + (q ? '没有找到匹配的资料' : '还没有任何资料') + '</p><p style="margin-top:6px"><span class="action" onclick="openAddModal()">添加第一条资料</span></p></div>';
     updateNavCounts(); return;
   }
   grid.innerHTML = filtered.map(e => '<div class="card"><div class="card-header"><div class="card-title">' + (e.url ? '<a href="' + esc(e.url) + '" target="_blank" rel="noopener">' + esc(e.title) + '</a>' : esc(e.title)) + '</div><div class="card-actions"><button onclick="openEditModal(\'' + e.id + '\')" title="编辑"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button><button onclick="deleteEntry(\'' + e.id + '\')" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div></div>' + (e.desc ? '<div class="card-desc">' + esc(e.desc) + '</div>' : '') + '<div class="card-meta">' + (e.category ? '<span class="badge badge-category">' + esc(e.category) + '</span>' : '') + (e.tags||[]).map(t => '<span class="badge badge-tag">#' + esc(t) + '</span>').join('') + '</div>' + (e.url ? '<div class="card-url"><a href="' + esc(e.url) + '" target="_blank" rel="noopener">' + esc(e.url) + '</a></div>' : '') + '<div class="card-date">' + fmtDate(e.createdAt) + '</div></div>').join('');
   updateNavCounts();
 }
 
 function updateNavCounts() {
   document.getElementById('countAll').textContent = data.entries.length;
   document.getElementById('countUncategorized').textContent = data.entries.filter(e => !e.category).length;
   document.getElementById('categoryList').innerHTML = data.categories.map(c => {
     const cnt = data.entries.filter(e => e.category === c).length;
     const act = currentCategory === c ? ' active' : '';
     return '<div class="nav-item' + act + '" data-cat="' + esc(c) + '" onclick="selectCategory(\'' + esc(c) + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg> ' + esc(c) + ' <span class="count">' + cnt + '</span></div>';
   }).join('');
 }
 
 function selectCategory(cat) { currentCategory = cat; document.querySelectorAll('#categoryNav > .nav-item[data-cat]').forEach(el => el.classList.toggle('active', el.dataset.cat === cat)); render(); }
 document.querySelectorAll('#categoryNav > .nav-item[data-cat]').forEach(el => el.addEventListener('click', () => selectCategory(el.dataset.cat)));
 
 function openAddModal() { editingId = null; document.getElementById('modalTitle').textContent = '添加资料'; document.getElementById('modalSave').textContent = '保存'; document.getElementById('entryForm').reset(); pendingTags = []; renderTags(); populateCategorySelect(); document.getElementById('modalOverlay').classList.add('open'); document.getElementById('formTitle').focus(); }
 function openEditModal(id) { const e = data.entries.find(x => x.id === id); if (!e) return; editingId = id; document.getElementById('modalTitle').textContent = '编辑资料'; document.getElementById('modalSave').textContent = '更新'; document.getElementById('formTitle').value = e.title||''; document.getElementById('formUrl').value = e.url||''; document.getElementById('formDesc').value = e.desc||''; pendingTags = [...(e.tags||[])]; renderTags(); populateCategorySelect(e.category||''); document.getElementById('modalOverlay').classList.add('open'); }
 function populateCategorySelect(selected) { const sel = document.getElementById('formCategory'); sel.innerHTML = '<option value="">未分类</option>' + data.categories.map(c => '<option value="' + esc(c) + '"' + (c === selected ? ' selected' : '') + '>' + esc(c) + '</option>').join(''); }
 function renderTags() { document.getElementById('tagList').innerHTML = pendingTags.map((t,i) => '<span class="tag">' + esc(t) + '<button type="button" onclick="removeTag(' + i + ')">&times;</button></span>').join(''); }
 function removeTag(i) { pendingTags.splice(i, 1); renderTags(); }
 
 document.getElementById('tagInput').addEventListener('keydown', function(e) {
   if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); const v = this.value.trim(); if (v && !pendingTags.includes(v)) { pendingTags.push(v); renderTags(); } this.value = ''; }
 });
 document.getElementById('tagInputWrap').addEventListener('click', function(e) { if (e.target === this || e.target.tagName === 'INPUT') document.getElementById('tagInput').focus(); });
 
 document.getElementById('entryForm').addEventListener('submit', function(e) {
   e.preventDefault();
   const title = document.getElementById('formTitle').value.trim();
   if (!title) { toast('请输入标题'); return; }
   const entry = { title, url: document.getElementById('formUrl').value.trim()||'', desc: document.getElementById('formDesc').value.trim()||'', category: document.getElementById('formCategory').value||'', tags: [...pendingTags] };
   if (editingId) { const idx = data.entries.findIndex(x => x.id === editingId); if (idx >= 0) data.entries[idx] = { ...data.entries[idx], ...entry }; toast('已更新'); }
   else { entry.id = uid(); entry.createdAt = Date.now(); data.entries.push(entry); toast('已添加'); }
   saveData(); closeModal(); render();
 });
 
 function deleteEntry(id) { if (!confirm('确定删除这条资料吗？')) return; data.entries = data.entries.filter(e => e.id !== id); saveData(); render(); toast('已删除'); }
 function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
 document.getElementById('modalCancel').addEventListener('click', closeModal);
 document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
 
 document.getElementById('addCategoryBtn').addEventListener('click', function() { const n = prompt('输入新分类名称：'); if (n && n.trim()) { const c = n.trim(); if (!data.categories.includes(c)) { data.categories.push(c); saveData(); render(); toast('已添加分类'); } else toast('分类已存在'); } });
 
 let searchTimer;
 document.getElementById('searchInput').addEventListener('input', function() { clearTimeout(searchTimer); searchTimer = setTimeout(render, 200); });
 
 let toastTimer;
 function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2200); }
