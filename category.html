<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-dark:#0a0a1a;
  --accent-pink:#ff6b9d;
  --accent-purple:#c084fc;
  --text-primary:#f1f0fb;
  --text-secondary:#a5a3c4;
  --glass-bg:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.08);
  --card-radius:16px;
  --transition:0.4s cubic-bezier(0.22,1,0.36,1)
}
body{
  font-family:'Noto Sans SC',-apple-system,sans-serif;
  background:var(--bg-dark);
  color:var(--text-primary);
  line-height:1.7;
  min-height:100vh
}
::selection{background:var(--accent-pink);color:#fff}

.navbar{position:sticky;top:0;z-index:100;padding:0 2rem;height:64px;display:flex;align-items:center;gap:1.5rem;background:rgba(10,10,26,0.93);border-bottom:1px solid rgba(255,255,255,0.06)}
.nav-back{color:var(--text-secondary);text-decoration:none;font-size:.9rem;transition:var(--transition);display:flex;align-items:center;gap:.4rem}
.nav-back:hover{color:var(--text-primary)}
.nav-title{font-size:1.1rem;font-weight:600;background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

main{max-width:800px;margin:0 auto;padding:3rem 2rem}
.category-header{margin-bottom:2.5rem}
.category-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:linear-gradient(135deg,rgba(255,107,157,0.15),rgba(192,132,252,0.15));color:var(--accent-purple);margin-bottom:1rem}
.category-name{font-family:'Noto Serif SC',serif;font-size:2rem;font-weight:600}
.category-desc{color:var(--text-secondary);font-weight:300;margin-top:.5rem}

.doc-list{display:grid;gap:1rem}
.doc-item{display:flex;align-items:center;gap:1.25rem;padding:1.25rem 1.5rem;border-radius:var(--card-radius);background:var(--glass-bg);border:1px solid var(--glass-border);transition:var(--transition);text-decoration:none;color:inherit}
.doc-item:hover{transform:translateX(6px);border-color:rgba(192,132,252,0.3);background:rgba(192,132,252,0.04)}
.doc-icon{width:44px;height:44px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(255,107,157,0.12);color:var(--accent-pink)}
.doc-info{flex:1;min-width:0}
.doc-name{font-weight:500;font-size:.95rem;margin-bottom:.15rem}
.doc-meta{color:var(--text-secondary);font-size:.8rem}
.doc-arrow{color:var(--text-secondary);font-size:.9rem;transition:var(--transition)}
.doc-item:hover .doc-arrow{color:var(--accent-purple);transform:translateX(4px)}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-secondary)}
.empty-state i{font-size:2.5rem;margin-bottom:1rem;color:rgba(192,132,252,0.3)}
.empty-state p{font-weight:300}

footer{padding:2rem;text-align:center;color:var(--text-secondary);font-size:.85rem;font-weight:300;border-top:1px solid rgba(255,255,255,0.04)}
footer a{color:var(--accent-purple);text-decoration:none}

@media(max-width:480px){
  main{padding:2rem 1.25rem}
  .category-name{font-size:1.6rem}
}
</style>

<nav class="navbar">

function renderCategory() {
  var hash = window.location.hash.substring(1) || 'math-analysis';
  var cat = categories[hash] || categories['math-analysis'];
  
  document.title = cat.name + ' — りく様の世界';
  document.getElementById('navTitle').textContent = cat.name;
  document.getElementById('catName').textContent = cat.name;
  document.getElementById('catDesc').textContent = cat.desc;
  document.getElementById('catIcon').innerHTML = '<i class="fa-solid ' + cat.icon + '"></i>';
  
  var list = document.getElementById('docList');
  if (cat.docs.length === 0) {
    list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-folder-open"></i><p>该分类暂无文档，持续整理中...</p></div>';
  } else {
    var html = '';
    for (var i = 0; i < cat.docs.length; i++) {
      var d = cat.docs[i];
      html += '<a href="' + d.file + '" class="doc-item" target="_blank">' +
        '<div class="doc-icon"><i class="fa-solid fa-file-pdf"></i></div>' +
        '<div class="doc-info"><div class="doc-name">' + d.name + '</div><div class="doc-meta">' + d.meta + '</div></div>' +
        '<div class="doc-arrow"><i class="fa-solid fa-arrow-right"></i></div>' +
        '</a>';
    }
    list.innerHTML = html;
  }
}
